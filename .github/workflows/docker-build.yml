name: Docker Static Site CI 

on:
  push:
    branches:
      - master               # Trigger on push to master branch since this is the main branch for deployment
    
  pull_request:
    branches:
      - master              # Trigger on pull request to master branch to ensure changes are tested before merging


jobs:
  docker-build:
    runs-on: ubuntu-latest                  # Use the latest Ubuntu runner for building and testing the Docker image it's a common choice for Docker workflows

    steps:

    # Checkout repository
    - name: Checkout Code 
      uses: actions/checkout@v4

    # Build Docker image
    - name: Build Docker Image
      run : |
        docker build -t cloud-static-site .        
    # Run Docker container\

    - name: Run Docker Container
      run: |
        docker run -d -p 8080:80 --name static-site cloud-static-site

    - name: Wait for container startup
      run: sleep 5

    - name: Verify Running Container
      run: docker ps -a

    - name: Check Container Logs
      run: docker logs static-site

  # Test the website
    - name: Test Website
      run: |
        curl -I http://localhost:8080           
          

    # Stop container
    - name: Stop Container
      run: |
        docker stop static-site
        docker rm static-site



# This workflow is designed to build a Docker image for a static site, run it in a container, and verify that it's working correctly. It includes steps to check the container logs and ensure that the website is accessible before stopping and removing the container.