name: Docker Static Site CI 

on:
  push:
    branches:
      - master
    
  pull_request:
    branches:
      - master


jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:

    # Checkout repository
    - name: Checkout Code 
      uses: actions/checkout@v4

    # Build Docker image
    - name: Build Docker Image
      run : |
        docker build -t cloud-static-site .

    # Run Docker container\

    - name: Run Docker Container
      run: |
        docker run -d -p 8080:80 --name static-site cloud-static-site

    - name: Wait for container startup
      run: sleep 5

    - name: Verify Running Container
      run: docker ps

    - name: Check Container Logs
      run: docker logs static-site

  # Test the website
    - name: Test Website
      run: |
        curl -I http://localhost:8080
          

    # Stop container
    - name: Stop Container
      run: |
        docker stop static-site
        docker rm static-site